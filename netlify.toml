[build]
  base = "frontend"
  command = "npm install --legacy-peer-deps && npm run build"
  publish = "build"

[build.environment]
  NODE_VERSION = "18"

# Fallback routing for React Router (Single Page Application)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Proxy API requests to backend (if hosted elsewhere)
# Uncomment and update the URL when the backend is deployed
# [[redirects]]
#   from = "/api/*"
#   to = "https://your-backend-url.com/api/:splat"
#   status = 200
#   force = true
